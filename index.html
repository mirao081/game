<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    body{
      background: #191919;
      color: white;
      font-family: Arial;
      
    }
    div{
      width: 60%;
      margin: auto;
      text-align: center;
      background: rgb(2, 2, 97);
      margin-bottom: 30px;
      border-radius: 30px;
      border: 1px solid white;
    }

    .title{
      font-size: 30px;
      font-weight: bold;
    }

    .move-icon{
      height: 50px;
      
    }

    .move-button{
      background-color: transparent;
      border: 3px solid white;
      border-radius: 60px;
      width: 120px;
      height: 120px;
      margin-right: 10px;
      cursor: pointer;
    }
    
    .result{
      font-size: 25px;
      font-weight: bold;
      margin-top: 50px;
    }

    .score{
      margin-top: 60px;
    }
    .reset-score-button{
      padding: 15px 60px;
      margin-bottom: 20px;
      cursor: pointer;
      border-radius: 30px;
      color: rgb(2, 2, 97);
      font-size: 20px;
      border: none;
    }
    .reset-score-button:hover{
      background: transparent;
      color: white;
    }
    @media screen and (max-width: 600px){
      .reset-score-button{
        padding: 10px 30px;
        margin-bottom: 20px;
        cursor: pointer;
        border-radius: 30px;
        color: #191919;
        font-size: 20px;
      }
      div{
        background: rgb(69, 0, 0);
        width: 90%;
        height: 100vh;
      }
      .reset-score-button:hover{
      background: transparent;
      color: white;
      }
      body{
        background: rgb(1, 1, 67);
      }
    }
  </style>
</head>
<body>
  <div>
    <p class="title">Rock Paper Scissors</p>

    <button class="move-button" onclick="playGame('rock')"><img src="images/javascript-course.png" alt="rock emoji" class="move-icon"></button>
    <button class="move-button" onclick="playGame('paper')"><img src="images/javascript-course1.png" alt="" class="move-icon"></button>
    <button class="move-button" onclick="playGame('scissors')"><img src="images/javascript-course2.png" alt="" class="move-icon"></button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
      scores.wins = 0;
      scores.losses = 0;
      scores.ties = 0;
      localStorage.removeItem('scores');
      updateScore();
    " class="reset-score-button">Reset scores</button>

  </div>
  
  <script>
    // Load scores from localStorage or initialize
    let scores = JSON.parse(localStorage.getItem('scores')) || {
      wins: 0,
      losses: 0,
      ties: 0
    };

    updateScore();

    function playGame(playerMove) {
      const computerMove = pickComputerMove();
      let result = '';

      if (playerMove === 'rock') {
        if (computerMove === 'rock') {
          result = 'tie';
        } else if (computerMove === 'paper') {
          result = 'you lose';
        } else {
          result = 'you win';
        }
      }

      if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'you win';
        } else if (computerMove === 'paper') {
          result = 'tie';
        } else {
          result = 'you lose';
        }
      }

      if (playerMove === 'scissors') {
        if (computerMove === 'rock') {
          result = 'you lose';
        } else if (computerMove === 'paper') {
          result = 'you win';
        } else {
          result = 'tie';
        }
      }

      // Update scores
      if (result === 'you win') {
        scores.wins++;
      } else if (result === 'you lose') {
        scores.losses++;
      } else {
        scores.ties++;
      }

      localStorage.setItem('scores', JSON.stringify(scores));
      updateScore();

      // Show result and moves
      document.querySelector('.js-result').innerHTML = result;

      document.querySelector('.js-moves').innerHTML = `You
      <img src="images/javascript-course${playerMove === 'rock' ? '' : playerMove === 'paper' ? '1' : '2'}.png" class="move-icon">
      <img src="images/javascript-course${computerMove === 'rock' ? '' : computerMove === 'paper' ? '1' : '2'}.png" class="move-icon">
      computer`;

    }

    function updateScore() {
      document.querySelector('.js-score').innerHTML =
        `Wins: ${scores.wins}, Losses: ${scores.losses}, Ties: ${scores.ties}`;
    }

    function pickComputerMove() {
      const randomNumber = Math.random();
      let computerMove = '';

      if (randomNumber < 1/3) {
        computerMove = 'rock';
      } else if (randomNumber < 2/3) {
        computerMove = 'paper';
      } else {
        computerMove = 'scissors';
      }

      return computerMove;
    }
  </script>
</body>
</html>
